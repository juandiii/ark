name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    if: "!contains(github.event.head_commit.message, 'chore:') && !contains(github.event.head_commit.message, 'docs:')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Calculate release version from commits
        id: version
        run: |
          # Get last release tag
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | head -1)

          if [ -z "$PREV_TAG" ]; then
            # First release ever
            RELEASE_VERSION="1.0.0"
            COMMITS=$(git log --oneline)
          else
            # Parse last released version
            LAST_VERSION=${PREV_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"

            # Analyze commits since last tag
            COMMITS=$(git log --oneline "$PREV_TAG"..HEAD)

            if [ -z "$COMMITS" ]; then
              echo "No new commits since $PREV_TAG. Skipping release."
              echo "SKIP=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            # Determine bump type from commit messages
            if echo "$COMMITS" | grep -qiE '(BREAKING CHANGE|!:)'; then
              RELEASE_VERSION="$((MAJOR + 1)).0.0"
            elif echo "$COMMITS" | grep -qiE '^[a-f0-9]+ feat'; then
              RELEASE_VERSION="$MAJOR.$((MINOR + 1)).0"
            else
              RELEASE_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            fi
          fi

          echo "RELEASE=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "SKIP=false" >> $GITHUB_OUTPUT

          # Calculate next SNAPSHOT
          IFS='.' read -r MAJOR MINOR PATCH <<< "$RELEASE_VERSION"
          NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))-SNAPSHOT"
          echo "NEXT=$NEXT_VERSION" >> $GITHUB_OUTPUT

          echo "Release: $RELEASE_VERSION → Next: $NEXT_VERSION"
        env:
          NEXUS_MIRROR_URL: ${{ secrets.NEXUS_MIRROR_URL }}
          NEXUS_MIRROR_SNAPSHOT_URL: ${{ secrets.NEXUS_MIRROR_SNAPSHOT_URL }}

      - name: Set release version
        if: steps.version.outputs.SKIP != 'true'
        run: ./mvnw versions:set -DnewVersion=${{ steps.version.outputs.RELEASE }} -DgenerateBackupPoms=false
        env:
          NEXUS_MIRROR_URL: ${{ secrets.NEXUS_MIRROR_URL }}
          NEXUS_MIRROR_SNAPSHOT_URL: ${{ secrets.NEXUS_MIRROR_SNAPSHOT_URL }}

      - name: Deploy release to Nexus
        if: steps.version.outputs.SKIP != 'true'
        run: ./mvnw clean deploy -DskipTests
        env:
          NEXUS_MIRROR_URL: ${{ secrets.NEXUS_MIRROR_URL }}
          NEXUS_MIRROR_SNAPSHOT_URL: ${{ secrets.NEXUS_MIRROR_SNAPSHOT_URL }}
          NEXUS_RELEASES_URL: ${{ secrets.NEXUS_RELEASES_URL }}
          NEXUS_SNAPSHOTS_URL: ${{ secrets.NEXUS_SNAPSHOTS_URL }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Create tag and update docs
        if: steps.version.outputs.SKIP != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s|<version>.*</version> <!-- ark-bom -->|<version>${{ steps.version.outputs.RELEASE }}</version> <!-- ark-bom -->|g" README.md docs/design.md
          git add README.md docs/design.md
          git diff --cached --quiet || git commit -m "docs: update version to ${{ steps.version.outputs.RELEASE }}"
          git tag v${{ steps.version.outputs.RELEASE }}
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.version.outputs.SKIP != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.RELEASE }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump develop to next SNAPSHOT
        if: steps.version.outputs.SKIP != 'true'
        run: |
          git checkout develop
          git pull origin develop
          ./mvnw versions:set -DnewVersion=${{ steps.version.outputs.NEXT }} -DgenerateBackupPoms=false
          git add -A
          git commit -m "chore: bump version to ${{ steps.version.outputs.NEXT }}"
          git push origin develop
        env:
          NEXUS_MIRROR_URL: ${{ secrets.NEXUS_MIRROR_URL }}
          NEXUS_MIRROR_SNAPSHOT_URL: ${{ secrets.NEXUS_MIRROR_SNAPSHOT_URL }}