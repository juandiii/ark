name: Deploy Snapshot

on:
  push:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17, 21, 25]
    name: Test Java ${{ matrix.java }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build and Test
        run: ./mvnw clean verify -Djava.version=${{ matrix.java }}
        env:
          NEXUS_MIRROR_URL: ${{ secrets.NEXUS_MIRROR_URL }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Deploy SNAPSHOT to Nexus
        run: ./mvnw clean deploy -DskipTests
        env:
          NEXUS_MIRROR_URL: ${{ secrets.NEXUS_MIRROR_URL }}
          NEXUS_RELEASES_URL: ${{ secrets.NEXUS_RELEASES_URL }}
          NEXUS_SNAPSHOTS_URL: ${{ secrets.NEXUS_SNAPSHOTS_URL }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}