name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      milestone:
        description: 'Milestone name (e.g. v1.1.0)'
        required: true
        type: string
      bump:
        description: 'Version bump (auto = from milestone PR labels)'
        required: false
        type: choice
        default: 'auto'
        options:
          - auto
          - patch
          - minor
          - major

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      release: ${{ steps.version.outputs.RELEASE }}
      skip: ${{ steps.version.outputs.SKIP }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Check no existing release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --label release --state open --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING" ]; then
            echo "❌ Release PR #$EXISTING already exists. Merge or close it first."
            exit 1
          fi

      - name: Determine release version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUMP_OVERRIDE: ${{ inputs.bump }}
          MILESTONE: ${{ inputs.milestone }}
        run: .github/scripts/determine-version.sh

  test:
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    uses: ./.github/workflows/test.yml
    secrets: inherit

  create-release-pr:
    needs: [preflight, test]
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Create release branch
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          NEXUS_MIRROR_URL: ${{ secrets.NEXUS_MIRROR_URL }}
          NEXUS_MIRROR_SNAPSHOT_URL: ${{ secrets.NEXUS_MIRROR_SNAPSHOT_URL }}
        run: |
          VERSION="${{ needs.preflight.outputs.release }}"
          MILESTONE="${{ inputs.milestone }}"
          BRANCH="release/v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"

          ./mvnw versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false
          .github/scripts/generate-changelog.sh "$VERSION" "${{ github.repository }}" "$MILESTONE"
          sed -i "s|<version>.*</version> <!-- ark-bom -->|<version>${VERSION}</version> <!-- ark-bom -->|g" README.md docs/design.md

          git add -A
          git commit -m "chore(release): prepare v${VERSION}"
          git push origin "$BRANCH"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION="${{ needs.preflight.outputs.release }}"
          MILESTONE="${{ inputs.milestone }}"
          BRANCH="release/v${VERSION}"

          PR_LIST=$(gh pr list --state merged --base main --search "milestone:\"$MILESTONE\"" \
            --json number,title,labels,author \
            --template '{{range .}}• {{.title}} (#{{.number}}) @{{.author.login}}{{"\n"}}{{end}}')

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Release v${VERSION}" \
            --body "## Release v${VERSION}

          **Milestone:** $MILESTONE

          ### PRs included
          ${PR_LIST}

          ### Checklist
          - [ ] CHANGELOG looks correct
          - [ ] Tests pass
          - [ ] Ready to publish

          > **Merge** this PR to deploy and tag the release.
          > **Close** without merging to abort." \
            --label "release" \
            --milestone "$MILESTONE"