name: Publish Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  publish:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION=${BRANCH#release/v}
          echo "RELEASE=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Set version and deploy
        run: |
          ./mvnw versions:set -DnewVersion=${{ steps.version.outputs.RELEASE }} -DgenerateBackupPoms=false
          ./mvnw clean deploy -DskipTests
        env:
          NEXUS_MIRROR_URL: ${{ secrets.NEXUS_MIRROR_URL }}
          NEXUS_MIRROR_SNAPSHOT_URL: ${{ secrets.NEXUS_MIRROR_SNAPSHOT_URL }}
          NEXUS_RELEASES_URL: ${{ secrets.NEXUS_RELEASES_URL }}
          NEXUS_SNAPSHOTS_URL: ${{ secrets.NEXUS_SNAPSHOTS_URL }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.RELEASE }}"
          git push origin "v${{ steps.version.outputs.RELEASE }}"

      - name: Bump back to SNAPSHOT
        env:
          NEXUS_MIRROR_URL: ${{ secrets.NEXUS_MIRROR_URL }}
          NEXUS_MIRROR_SNAPSHOT_URL: ${{ secrets.NEXUS_MIRROR_SNAPSHOT_URL }}
        run: .github/scripts/bump-snapshot.sh "${{ steps.version.outputs.RELEASE }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.RELEASE }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close milestone and cleanup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Close milestone if assigned to PR
          MILESTONE="${{ github.event.pull_request.milestone.title }}"
          if [ -n "$MILESTONE" ]; then
            MILESTONE_NUMBER=$(gh api repos/${{ github.repository }}/milestones --jq ".[] | select(.title == \"$MILESTONE\") | .number")
            if [ -n "$MILESTONE_NUMBER" ]; then
              gh api repos/${{ github.repository }}/milestones/$MILESTONE_NUMBER -f state=closed
              echo "✅ Milestone '$MILESTONE' closed"
            fi
          fi

          # Delete release branch
          git push origin --delete "release/v${{ steps.version.outputs.RELEASE }}" || true
