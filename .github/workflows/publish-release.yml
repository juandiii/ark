name: Publish Release

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  extract-version:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    outputs:
      release: ${{ steps.version.outputs.RELEASE }}
    steps:
      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION=${BRANCH#release/v}
          echo "RELEASE=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

  verify:
    needs: extract-version
    uses: ./.github/workflows/test.yml
    secrets: inherit

  deploy:
    needs: [extract-version, verify]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Set version and deploy to Maven Central
        run: |
          ./mvnw versions:set -DnewVersion=${{ needs.extract-version.outputs.release }} -DgenerateBackupPoms=false
          ./mvnw clean deploy -Prelease
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  tag:
    needs: [extract-version, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.extract-version.outputs.release }}"
          git push origin "v${{ needs.extract-version.outputs.release }}"

  github-release:
    needs: [extract-version, tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.extract-version.outputs.release }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bump-snapshot:
    needs: [extract-version, tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Bump to next SNAPSHOT
        run: .github/scripts/bump-snapshot.sh "${{ needs.extract-version.outputs.release }}"

  cleanup:
    needs: [extract-version, tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Close milestone and delete branch
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          MILESTONE="${{ github.event.pull_request.milestone.title }}"
          if [ -n "$MILESTONE" ]; then
            MILESTONE_NUMBER=$(gh api repos/${{ github.repository }}/milestones --jq ".[] | select(.title == \"$MILESTONE\") | .number")
            if [ -n "$MILESTONE_NUMBER" ]; then
              gh api repos/${{ github.repository }}/milestones/$MILESTONE_NUMBER -f state=closed
              echo "✅ Milestone '$MILESTONE' closed"
            fi
          fi

          git push origin --delete "release/v${{ needs.extract-version.outputs.release }}" || true