name: Publish Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  extract-version:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.version.outputs.RELEASE }}
    steps:
      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION=${BRANCH#release/v}
          echo "RELEASE=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

  deploy:
    needs: extract-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Set version and deploy to Maven Central
        run: |
          ./mvnw versions:set -DnewVersion=${{ needs.extract-version.outputs.release }} -DgenerateBackupPoms=false
          ./mvnw clean deploy -Prelease -DskipTests
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  tag:
    needs: [extract-version, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.extract-version.outputs.release }}"
          git push origin "v${{ needs.extract-version.outputs.release }}"

  github-release:
    needs: [extract-version, tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.extract-version.outputs.release }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bump-snapshot:
    needs: [extract-version, tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Bump to next SNAPSHOT
        run: .github/scripts/bump-snapshot.sh "${{ needs.extract-version.outputs.release }}"

  cleanup:
    needs: [extract-version, tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Close milestone and delete branch
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          MILESTONE="${{ github.event.pull_request.milestone.title }}"
          if [ -n "$MILESTONE" ]; then
            MILESTONE_NUMBER=$(gh api repos/${{ github.repository }}/milestones --jq ".[] | select(.title == \"$MILESTONE\") | .number")
            if [ -n "$MILESTONE_NUMBER" ]; then
              gh api repos/${{ github.repository }}/milestones/$MILESTONE_NUMBER -f state=closed
              echo "✅ Milestone '$MILESTONE' closed"
            fi
          fi

          git push origin --delete "release/v${{ needs.extract-version.outputs.release }}" || true