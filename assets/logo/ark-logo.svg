<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 128" role="img" aria-label="Ark — HTTP client for Java">
  <title>Ark</title>
  <defs>
    <linearGradient id="ark-logo-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
  </defs>

  <!-- ICON -->
  <g>
    <!-- tile -->
    <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#ark-logo-tile)"/>

    <!-- water -->
    <g stroke="#ffffff" stroke-opacity="0.30" stroke-width="3" stroke-linecap="round" fill="none">
      <path d="M14 96 q5 -5 10 0 t10 0"/>
      <path d="M94 96 q5 -5 10 0 t10 0"/>
    </g>

    <!-- ark: peaked roof + trapezoidal hull -->
    <g fill="#ffffff">
      <path d="M22 74 L106 74 L94 102 L34 102 Z"/>
      <path d="M40 74 L64 42 L88 74 Z"/>
    </g>

    <!-- Hull plank line -->
    <line x1="34" y1="86" x2="94" y2="86" stroke="#0e7490" stroke-opacity="0.30" stroke-width="1.5"/>
  </g>

  <!-- WORDMARK (dark slate for light theme) -->
  <text x="148" y="86"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="80"
        font-weight="700"
        fill="#0f172a"
        letter-spacing="-3">ark</text>
</svg>
